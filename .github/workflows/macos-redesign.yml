name: macOS Redesigned GUI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: src/gui4/macOS

jobs:
  run-tests:
    name: Run tests
    runs-on: [ self-hosted, iOS ]
    if: ${{ contains(join(github.event.*.labels.*.name, ','), 'macOS UI') || contains(join(github.event.*.labels.*.name, ','), 'XPC') }}

    # We disable code signing to avoid issues with missing certificates/provisioning profiles on the CI runner
    # More info here: https://github.com/orgs/community/discussions/175498
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        run: |
          xcodebuild \
            -scheme kDrive \
            -destination "platform=macOS,arch=arm64" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            ENABLE_HARDENED_RUNTIME=NO \
            build-for-testing
      - name: Run tests
        run: |
          xcodebuild \
            -scheme kDrive \
            -destination "platform=macOS,arch=arm64" \
            test-without-building

  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest
    if: ${{ contains(join(github.event.*.labels.*.name, ','), 'macOS UI') || contains(join(github.event.*.labels.*.name, ','), 'XPC') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Mise
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8
        with:
          working_directory: src/gui4/macOS
      - name: SwiftLint
        run: swiftlint --config .swiftlint.yml --config .swiftlint-ci.yml --reporter github-actions-logging --reporter json .

  swiftformat:
    name: SwiftFormat
    runs-on: ubuntu-latest
    if: ${{ contains(join(github.event.*.labels.*.name, ','), 'macOS UI') || contains(join(github.event.*.labels.*.name, ','), 'XPC') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Mise
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8
        with:
          working_directory: src/gui4/macOS
      - name: SwiftFormat
        run: swiftformat --lint . --reporter github-actions-log --reporter json

  periphery:
    name: Periphery
    runs-on: [ self-hosted, iOS ]
    if: ${{ contains(join(github.event.*.labels.*.name, ','), 'macOS UI') || contains(join(github.event.*.labels.*.name, ','), 'XPC') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Mise
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8
        with:
          working_directory: src/gui4/macOS      
      - name: Periphery
        run: periphery scan --retain-codable-properties --format github-actions --format json --relative-results --strict

  required-checks:
    name: Required checks
    runs-on: ubuntu-latest
    if: always()
    needs: [swiftformat, periphery]
    permissions: {}

    steps:
      - name: Verify SwiftFormat and Periphery passed when XPC or macOS UI label is applied
        env:
          HAS_REQUIRED_LABEL: ${{ contains(join(github.event.pull_request.labels.*.name, ','), 'XPC') || contains(join(github.event.pull_request.labels.*.name, ','), 'macOS UI') }}
          SWIFTFORMAT_RESULT: ${{ needs.swiftformat.result }}
          PERIPHERY_RESULT: ${{ needs.periphery.result }}
        run: |
          if [[ "$HAS_REQUIRED_LABEL" == "true" ]]; then
            if [[ "$SWIFTFORMAT_RESULT" != "success" ]]; then
              echo "SwiftFormat did not succeed (result: $SWIFTFORMAT_RESULT) but the XPC or macOS UI label is applied."
              exit 1
            fi
            if [[ "$PERIPHERY_RESULT" != "success" ]]; then
              echo "Periphery did not succeed (result: $PERIPHERY_RESULT) but the XPC or macOS UI label is applied."
              exit 1
            fi
          fi
          echo "All required checks passed."

