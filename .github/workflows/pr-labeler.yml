name: PR Auto Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  path-labels:
    runs-on: self-hosted
    steps:
      - name: Apply path-based labels
        uses: actions/labeler@v6.0.1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

  draft-ci-free-label:
    runs-on: self-hosted
    if: ${{ github.event.action == 'opened' && github.event.pull_request.draft }}
    steps:
      - name: Add CI Free label on draft PR
        uses: actions/github-script@v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels: ["CI Free ⛓️‍💥"],
              });
              core.info('Added "CI Free ⛓️‍💥" label to draft PR.');
            } catch (e) {
              core.warning(`Failed to add label: ${e.message}`);
            }

  remove-ci-free-labels:
    runs-on: self-hosted
    if: ${{ github.event.action == 'ready_for_review' }}
    steps:
      - name: Remove all CI Free labels when PR is marked ready
        uses: actions/github-script@v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            const ciFreeLabelPrefix = "CI Free";

            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner,
              repo,
              issue_number: prNumber,
            });

            for (const label of labels) {
              if (label.name.startsWith(ciFreeLabelPrefix)) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: prNumber,
                    name: label.name,
                  });
                  core.info(`Removed label "${label.name}".`);
                } catch (e) {
                  core.warning(`Failed to remove label "${label.name}": ${e.message}`);
                }
              }
            }

  quick-fix-label:
    runs-on: self-hosted
    steps:
      - name: Check total changed lines and add quick fix label
        uses: actions/github-script@v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            // List files in PR
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100,
              }
            );

            // Sum additions + deletions
            const changed = files.reduce(
              (sum, f) => sum + (f.additions || 0) + (f.deletions || 0),
              0
            );

            core.info(`Total changed lines: ${changed}`);

            if (changed <= 20) {
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: ["quick fix 🚀"],
                });
                core.info('Added "quick fix 🚀" label.');
              } catch (e) {
                core.warning(`Failed to add label: ${e.message}`);
              }
            } else {
              core.info("Change exceeds quick fix threshold; not labeling.");
            }
