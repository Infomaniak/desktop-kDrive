name: "Check Links in PR"
description: "Fails if any changed file contains a blocked domain link from config."
inputs:
  config-file:
    description: "Path to the blocked links config file"
    default: ".github/actions/check-no-links/blocked-links.txt"

  base-ref:
    description: "The base branch ref of the PR (e.g., main)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout PR code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run link check
      shell: bash
      run: |
        set -e

        CONFIG_FILE="${{ inputs.config-file }}"
        BASE_REF="${{ inputs.base-ref }}"

        if [[ ! -f "$CONFIG_FILE" ]]; then
          echo "Config file not found: $CONFIG_FILE"
          exit 1
        fi

        # Make sure the base branch is fetched
        git fetch origin "$BASE_REF":"$BASE_REF"

        # Get changed files relative to base
        CHANGED_FILES=$(git diff --name-only "$BASE_REF"..HEAD)

        # Load blocked domains
        mapfile -t BLOCKED_DOMAINS < "$CONFIG_FILE"

        # Regex to detect links (including the typo htptp)
        LINK_REGEX="(https?:\/\/[^\s\"'<>]+|www\.[^\s\"'<>]+|htptp:\/\/[^\s\"'<>]+)"

        FAIL=0

        for file in $CHANGED_FILES; do
          if [[ -f "$file" ]]; then
            while read -r line; do
              if [[ "$line" =~ $LINK_REGEX ]]; then
                LINK_FOUND="${BASH_REMATCH[0]}"
                for domain in "${BLOCKED_DOMAINS[@]}"; do
                  if [[ "$LINK_FOUND" == *"$domain"* ]]; then
                    echo "Blocked domain link found in $file: $LINK_FOUND"
                    FAIL=1
                  fi
                done
              fi
            done < "$file"
          fi
        done

        if [[ $FAIL -eq 1 ]]; then
          echo "One or more blocked domain links found. Failing the check."
          exit 1
        else
          echo "No blocked domain links found."
        fi
