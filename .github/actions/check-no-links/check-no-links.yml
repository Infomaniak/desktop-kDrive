name: Check for Links in PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check_links:
    runs-on: self-hosted

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: files
        shell: node
        run: |
          const { execSync } = require('child_process');
          const baseRef = process.env.GITHUB_BASE_REF || process.env.GITHUB_REF_NAME;
          const output = execSync(`git diff --name-only origin/${baseRef}...HEAD`).toString().trim();
          require('fs').appendFileSync(process.env.GITHUB_ENV, `CHANGED_FILES=${output.replace(/\r?\n/g, ' ')}\n`);


      - name: Check for links in changed files
        shell: node
        run: |
          const { execSync } = require('child_process');
          const fs = require('fs');

          const changedFiles = process.env.CHANGED_FILES?.split(/\s+/).filter(f => f);
          if (!changedFiles?.length) {
            console.log("✅ No changed files detected.");
            process.exit(0);
          }

          const allowFile = '.github/actions/check-no-links/allowed-links.txt';
          const allowed = fs.existsSync(allowFile)
            ? fs.readFileSync(allowFile, 'utf8')
                .split(/\r?\n/)
                .map(l => l.trim())
                .filter(l => l && !l.startsWith('#'))
            : [];

          for ( let i = 0; i < allowed.length; i++) {
            console.log(`Allowed link prefix [${i}]: ${allowed[i]}`);
          }
          console.log(`✅ Loaded ${allowed.length} allowed link(s).`);

          const linkRegex = /\b(h[t]{1,3}p[s]?:\/\/|www\.)/i;
          const extractRegex = /(h[t]{1,3}p[s]?:\/\/[^\s"']+|www\.[^\s"']+)/gi;
          let hasLinks = false;

          for (const file of changedFiles) {
            if (fs.existsSync(file) && fs.lstatSync(file).isFile()) {
              const lines = fs.readFileSync(file, 'utf8').split(/\r?\n/);
              lines.forEach((line, i) => {
                const matches = line.match(extractRegex) || [];
                const offending = matches.filter(link =>
                  !allowed.some(prefix => link.startsWith(prefix))
                );
                if (offending.length > 0) {
                  console.error(`::error file=${file},line=${i + 1}::Contains forbidden link(s): ${offending.join(', ')}`);
                  hasLinks = true;
                }
              });
            }
          }

          if (hasLinks) {
            console.error("❌ Links detected in modified files.");
            process.exit(1);
          } else {
            console.log("✅ No links found in modified files.");
          }
