    Novedades
   </b>
  </h2>
  <ul>
   <li>
    Hemos actualizado nuestro sistema de versiones. A partir de ahora, las versiones de kDrive siguen el formato
    <b>
     mayor.menor.parche.compilación
    </b>
    en lugar de
    <b>
     mayor.menor.parche.fecha
    </b>
    (es decir, 3.7.8.0 en lugar de 3.7.8.20251028).
   </li>
  </ul>
